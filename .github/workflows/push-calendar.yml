name: Update Schedule Calendar

on:
  schedule:
    - cron: '0 18 * * 0'  # Sunday 6 PM UTC (~7 PM CET / 8 PM CEST)
  workflow_dispatch:       # Allow manual trigger for testing

permissions:
  contents: write

jobs:
  generate-ics:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate schedule.ics
        run: node scripts/push-to-calendar.js

      - name: Commit and push updated calendar
        run: |
          git config user.name "konskyrt"
          git config user.email "kyrkost@outlook.com"
          git add schedule.ics
          git diff --cached --quiet || git commit -m "Update schedule.ics for next week"
          git push
